# Alternative GitHub Actions Workflow (Backup Solution)

# If the Ruby 3.2.0 fix doesn't work, use this workflow instead
# This uses a different, more maintained action with better Ruby 3.3 support

name: Build and Deploy to Github Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Alternative action with better Ruby 3.3 support
      - uses: helaili/jekyll-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target_branch: 'gh-pages'
          build_only: false

      # OR use GitHub's native Pages build (even simpler)
      # Requires: Settings → Pages → Source: GitHub Actions
      # Then use the official Jekyll workflow from GitHub
