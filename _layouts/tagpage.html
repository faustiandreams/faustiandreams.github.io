---
layout: base 
---

<div class="tag">
  <h1 class="tag-title">Tag: {{ page.tag }}</h1>
  <div class="post_list">
    <ul>
    {% for post in site.tags[page.tag] %}
      <li><a href="{{ post.url }}">{{ post.title }}</a> ({{ post.date | date_to_string }})
        <br><span class="tag-excerpt">{{ post.excerpt | truncate: 120 }}</span>
      </li>
      <br>
    {% endfor %}
    </ul>
  </div>
</div>
